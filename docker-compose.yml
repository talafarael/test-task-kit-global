services:
  mongodb:
    image: mongo:7
    container_name: kit-global-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: kit_global
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
